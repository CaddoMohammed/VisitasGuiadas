<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
		<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
		<title>Visitas Guiadas VOAE</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body style="width:100vw; min-height:100dvh;" data-bs-theme="dark">
		<div class="arjs-loader">
			<div>Cargando...</i></div>
		</div>	
		<a-scene vr-mode-ui="enabled:true;" renderer="logarithmicDepthBuffer: true;" embedded arjs="trackingMethod:best; sourceType:webcam; debugUIEnabled:true;" >
				<a-nft type="nft" url="datos/qrcode-generado" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
					<a-sphere position="0.5 0.5 0.5" radius="10.5" material="color: blue;"></a-sphere>
				</a-nft>
			<a-entity camera></a-entity>
	  	</a-scene>
	</body>
</html>
